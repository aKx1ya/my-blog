<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>博客管理后台</title>
  <link href="config.yml" type="text/yaml" rel="cms-config-url">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script src="https://unpkg.com/decap-cms-locales@^3.0.0/dist/decap-cms-locales-zh_Hans.js"></script>

  <script>
    // 3. 确保脚本加载后执行注册逻辑
    if (window.CMS && window.CMS_LOCALES) {
      // 注册中文界面
      CMS.registerLocale('zh_Hans', window.CMS_LOCALES.zh_Hans);
      
      // 注册 Butterfly 专属提示块组件
      CMS.registerEditorComponent({
        id: "butterfly-note",
        label: "💡 插入提示块",
        fields: [{ name: "content", label: "内容", widget: "text" }],
        pattern: /^{% note info %}\n([\s\S]*?)\n{% endnote %}$/m,
        fromBlock: function(match) { return { content: match[1] }; },
        toBlock: function(obj) { return '{% note info %}\n' + (obj.content || '') + '\n{% endnote %}'; },
        toPreview: function(obj) { 
          return '<div style="padding:15px; border-left:5px solid #1890ff; background:#e8f4fd; color:#000;">' + (obj.content || '') + '</div>'; 
        }
      });
      console.log("Netlify CMS 自定义组件与语言包加载成功！");
    } else {
      console.error("加载失败，请检查网络是否能访问 unpkg.com");
    }
  </script>
</body>
</html>
